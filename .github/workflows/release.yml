name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Package and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p tablite
          cp main.js styles.css manifest.json tablite/
          zip -r tablite-${tag}.zip tablite/
          gh release create "$tag" \
            --title "Tablite ${tag}" \
            --generate-notes \
            tablite-${tag}.zip \
            main.js styles.css manifest.json
